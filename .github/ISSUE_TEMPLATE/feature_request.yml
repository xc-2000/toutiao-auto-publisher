name: 功能建议
description: 建议新能力或工作流改进
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 描述当前工作流中的具体问题。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的方案
  - type: checkboxes
    id: contribution
    attributes:
      label: 参与方式
      options:
        - label: 我愿意提交 Pull Request
