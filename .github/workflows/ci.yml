name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pytest
      - name: Install Node.js dependencies
        run: npm ci
      - name: Check repository for secrets
        run: python scripts/check_secrets.py
      - name: Compile Python modules
        run: python -m py_compile dashboard.py toutiao_challenges.py toutiao_publisher.py toutiao_protocol.py toutiao_video.py
      - name: Run Python tests
        run: python -m pytest tests -q
      - name: Check JavaScript syntax
        run: npm test
